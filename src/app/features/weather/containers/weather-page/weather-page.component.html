<main class="weather-container" [class]="weatherBackgroundClass()">
    <h1 class="page-title">EcoTransit Explorer</h1>

    @if (weatherConfigIssue()) {
    <div class="config-warning" data-testid="weather-config-warning">
        <strong>Weather config required.</strong>
        {{ weatherConfigIssue()!.message }}
    </div>
    }

    <app-weather-widget [weather]="service.weatherResource.value() ?? undefined"
        [isLoading]="service.weatherResource.isLoading()" [error]="service.lastError() ?? service.weatherResource.error()"
        (searchRequested)="service.search($event)" (retryRequested)="service.retry()">
    </app-weather-widget>

    @if (service.forecastResource.value()) {
    @defer (on idle) {
        <app-forecast-widget [forecasts]="service.forecastResource.value() ?? undefined"
            [isLoading]="service.forecastResource.isLoading()">
        </app-forecast-widget>
    } @placeholder {
        <div class="forecast-placeholder" aria-hidden="true"></div>
    }
    }


</main>
